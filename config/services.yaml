parameters:
    app.auth_user: '%env(APP_AUTH_USER)%'
    app.auth_password: '%env(APP_AUTH_PASSWORD)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Kernel.php'

    App\Config\PrismConfigLoader:
        arguments:
            $configPath: '%kernel.project_dir%/prism.config.yaml'

    App\Bunq\BunqConfigLoader:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Picnic\PicnicConfigLoader:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Security\EnvUserProvider:
        arguments:
            $username: '%app.auth_user%'
            $password: '%app.auth_password%'

    App\Twilio\TranscriptionStore:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Whisper\WhisperService:
        arguments:
            $providers: !tagged_iterator app.whisper_provider

    App\Mcp\McpHandler:
        arguments:
            $tools: !tagged_iterator app.mcp_tool

    App\AgentNotify\AgentNotifyService:
        arguments:
            $clients: !tagged_iterator app.agent_notify_client

    App\Email\MessageCache:
        arguments:
            $emailCache: '@cache.email'

    _instanceof:
        App\Mcp\Tool\ToolInterface:
            tags: ['app.mcp_tool']
        App\Whisper\WhisperProviderInterface:
            tags: ['app.whisper_provider']
        App\AgentNotify\AgentNotifyClientInterface:
            tags: ['app.agent_notify_client']
