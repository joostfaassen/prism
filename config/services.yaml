parameters:
    app.auth_user: '%env(APP_AUTH_USER)%'
    app.auth_password: '%env(APP_AUTH_PASSWORD)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Kernel.php'

    App\Config\PrismConfigLoader:
        arguments:
            $configPath: '%kernel.project_dir%/prism.config.yaml'

    App\Bunq\BunqConfigLoader:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Picnic\PicnicConfigLoader:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Security\EnvUserProvider:
        arguments:
            $username: '%app.auth_user%'
            $password: '%app.auth_password%'

    App\Mcp\McpHandler:
        arguments:
            $tools: !tagged_iterator app.mcp_tool

    _instanceof:
        App\Mcp\Tool\ToolInterface:
            tags: ['app.mcp_tool']
